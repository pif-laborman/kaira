<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kaira — Yoga that adapts to you</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Palette — pure white page, soft warm card accents */
    --bg: #ffffff;          /* page background — pure white */
    --bg-2: #f5f2ec;        /* warm taupe section bg */
    --card: #ffffff;        /* primary card — pure white */
    --card-2: #fafaf7;      /* faint warm white */
    --blush: #f4e9e3;       /* warm beige accent */
    --blush-2: #e8d8cc;
    --ink: #14130f;         /* near-black */
    --ink-2: #2a2926;
    --ink-3: #6b6a64;
    --rule: #e6e3dc;
    --rule-2: #efece5;
    --tag-bg: #f3f0ea;
    --pill: #14130f;
    --pill-ink: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  /* Wrap each major section in subtle warm card to provide section bg */
  .section-bg { background: var(--card-2); border-radius: 22px; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  img { display: block; max-width: 100%; }

  /* Type system — modern friendly sans, regular width */
  .display {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .display-xl {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 6.4vw, 84px);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }
  .display-lg {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(32px, 4.4vw, 60px);
    line-height: 1.08;
    letter-spacing: -0.022em;
  }
  .display-md {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(24px, 2.8vw, 40px);
    line-height: 1.15;
    letter-spacing: -0.018em;
  }
  .display-sm {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(18px, 1.6vw, 22px);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .display-cap {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 3.4vw, 48px);
    line-height: 1.05;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  .eyebrow {
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .body-lg { font-size: clamp(16px, 1.25vw, 19px); line-height: 1.55; color: var(--ink-2); }
  .body { font-size: 15px; line-height: 1.6; color: var(--ink-2); }
  .small { font-size: 13px; line-height: 1.5; color: var(--ink-3); }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 0.04em; }

  /* Layout */
  .page { max-width: 1320px; margin: 0 auto; padding: 24px clamp(16px, 3vw, 40px); position: relative; }
  .frame { position: relative; padding: clamp(48px, 6vw, 96px) 0; }

  /* Registration crosses (the "+") */
  .reg-mark {
    position: absolute;
    width: 14px; height: 14px;
    color: var(--ink-3);
    opacity: 0.55;
    pointer-events: none;
  }
  .reg-mark::before, .reg-mark::after {
    content: ""; position: absolute; background: currentColor;
  }
  .reg-mark::before { left: 50%; top: 0; bottom: 0; width: 1px; transform: translateX(-50%); }
  .reg-mark::after  { top: 50%; left: 0; right: 0; height: 1px; transform: translateY(-50%); }

  /* Common card */
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: clamp(24px, 3vw, 48px);
    position: relative;
    overflow: hidden;
  }
  .card-white { background: var(--card-2); }
  .card-blush { background: var(--blush); }

  /* Buttons & pills */
  /* Buttons — split pill: dark label + separated circle arrow */
  .btn-pill {
    display: inline-flex; align-items: center; gap: 2px;
    background: transparent; padding: 0;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink);
  }
  .btn-pill > .label {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--pill); color: var(--pill-ink);
    height: 52px;
    padding: 0 32px;
    border-radius: 999px;
    white-space: nowrap;
    transition: transform .35s cubic-bezier(.65,0,.35,1);
  }
  .btn-pill .arrow {
    width: 52px; height: 52px; border-radius: 999px;
    background: var(--pill); color: var(--pill-ink);
    display: inline-grid; place-items: center;
    transition: transform .35s cubic-bezier(.65,0,.35,1);
    flex: 0 0 auto;
    border: 0;
  }
  /* Hover — pill nudges left, arrow slides right opening a gap */
  .btn-pill:hover > .label { transform: translateX(-3px); }
  .btn-pill:hover .arrow { transform: translateX(8px); }
  .btn-pill.light > .label { background: #fff; color: var(--ink); }
  .btn-pill.light .arrow { background: #fff; color: var(--ink); border: 0; }
  /* Inverted (used on dark sections) */
  .btn-pill.inverted > .label { background: #fff; color: var(--ink); }
  .btn-pill.inverted .arrow { background: #fff; color: var(--ink); }
  /* Compact size for inside-card buttons */
  .btn-pill.sm { gap: 2px; font-size: 11px; }
  .btn-pill.sm > .label { height: 42px; padding: 0 22px; }
  .btn-pill.sm .arrow { width: 42px; height: 42px; }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid var(--ink); border-radius: 999px;
    padding: 14px 22px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    transition: background .2s ease, color .2s ease;
  }
  .btn-ghost:hover { background: var(--ink); color: var(--bg); }

  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--tag-bg);
    font-size: 12px; font-weight: 500;
    color: var(--ink-2);
    border: 1px solid transparent;
  }
  .pill.dark { background: var(--ink); color: var(--card-2); border-color: var(--ink); }
  .pill.outline { background: transparent; border-color: var(--rule); }

  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 999px;
    border: 1px solid var(--ink);
    display: inline-grid; place-items: center;
    background: transparent;
    transition: background .2s ease, color .2s ease, transform .2s ease;
  }
  .icon-btn:hover { background: var(--ink); color: var(--card-2); transform: translateY(-1px); }
  .icon-btn.filled { background: var(--ink); color: var(--card-2); }
  .icon-btn.filled:hover { background: #2a2924; }

  /* Density variations */
  body[data-density="compact"] .frame { padding: clamp(32px, 4vw, 64px) 0; }
  body[data-density="compact"] .card { padding: clamp(20px, 2.5vw, 32px); }

  /* App skeleton */
  #root { display: block; }

  /* Subtle scroll */
  html { scroll-behavior: smooth; }

  /* Hide scrollbar on horizontal carousels */
  .h-scroll {
    overflow-x: auto;
    scrollbar-width: none;
  }
  .h-scroll::-webkit-scrollbar { display: none; }

  /* Selection */
  ::selection { background: var(--ink); color: var(--bg); }
</style>
</head>
